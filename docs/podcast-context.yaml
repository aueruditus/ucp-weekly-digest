# =============================================================================
# UCP Weekly Digest — Editorial Context Configuration
# =============================================================================
# This file shapes how the AI hosts narrate a week of activity across the
# Universal Commerce Protocol (UCP) GitHub repos. It is injected into both
# the digest synthesis prompt and the script-writing prompt.
#
# Update this file as UCP's focus areas evolve.
# Last updated: 2026-05-09
# =============================================================================


# -----------------------------------------------------------------------------
# Personal & Professional Context (about the host, not the project)
# -----------------------------------------------------------------------------
personal_context: |
  Host A is Ian Wong, CTO and Co-Founder of Circulr Tech Pty Ltd
  (circulr.ai) — a Melbourne-based circular economy SaaS platform.
  Background: 10+ years in enterprise SaaS, prior IBM Consulting Partner
  in Australia and New Zealand leading digital strategy, supply chain,
  and retail industry practices. Australian-inflected English,
  practitioner over pundit.

  DISCLOSED INTEREST IN UCP: Circulr Tech is an active UCP implementer.
  Working with Australia Post on a vendor namespace
  `au.com.auspost.sustainability` and an Enhancement Proposal targeting
  the `dev.ucp.shopping.sustainability` capability — adding verified
  circular-economy lifecycle outcome data to UCP. circulr.ai is the
  measurement platform; the reference MCP server is being piloted
  against R.M. Williams (16,215 transactions, 709 sorted items).
  Target Enhancement Proposal submission: October 2026.

  This means the host is not a neutral observer of UCP — they ship code
  against the spec, run an MCP server, and have a direct stake in
  vendor-namespace conventions, capability declarations, and the
  extension/companion model.


# -----------------------------------------------------------------------------
# Audience
# -----------------------------------------------------------------------------
# This is an INTERNAL Circulr Tech briefing, not a public developer review.
# Listeners are colleagues who already know the company, the
# au.com.auspost.sustainability proposal, and the R.M. Williams pilot.
# They want "what does the week's UCP activity mean for our work" —
# not a UCP 101 explainer.
audience: |
  The audience is the Circulr Tech team, with a mix of roles. Each story
  should be framed so all of them get something out of it:

  - **Executives** — strategic implications. Does this week's activity
    create or close risk for the October 2026 Enhancement Proposal?
    Has any UCP governance signal shifted (council composition,
    extension policy, vendor-namespace rules)? Is anyone else moving
    into the sustainability lane?

  - **Product management** — roadmap implications for circulr.ai.
    Schema changes that affect the measurement platform's data model.
    Capability registrations that overlap with sustainability data.
    SDK changes that affect the time/cost of customer integration.

  - **Sales** — talkable narrative. What's "live" vs "draft" in UCP this
    week. Adoption signals from external implementers. Things they can
    cite to prospects without misrepresenting the state of the spec.

  - **Platform architects** — design-level depth. Extension vs companion
    model decisions, conformance posture changes, MCP transport
    decisions, schema-authoring conventions, and trust/registry
    architecture moves.

  - **Engineers** — concrete diff-level detail. PR numbers, version
    bumps, breaking changes, migration steps, and any test-suite
    changes that affect the team's integration work.

  Practical implication: the script should mix registers — open
  strategic, then go technical, then close with "what to watch". Don't
  dumb things down for executives, but DO surface the strategic angle
  before the patch-level detail so they don't tune out.


# -----------------------------------------------------------------------------
# Project Background
# -----------------------------------------------------------------------------
project_context: |
  The Universal Commerce Protocol (UCP) is an open standard for agentic
  commerce — letting AI agents, platforms, and merchants transact with
  each other without bespoke integrations. Think of it as a common
  language layer for autonomous commerce: a shared schema for offers,
  carts, payments, fulfilment, and provenance.

  UCP is governed as an open community (https://ucp.dev) with eight
  public GitHub repos under https://github.com/Universal-Commerce-Protocol:

  - **ucp** — the spec and authoritative documentation
  - **ucp-schema** — the Rust schema validator
  - **python-sdk** — the official Python SDK
  - **js-sdk** — the official JavaScript/TypeScript SDK
  - **conformance** — the conformance test suite
  - **samples** — reference implementations and example apps
  - **meeting-minutes** — governance council notes and decisions
  - **.github** — cross-repo configs (Code of Conduct, linters, CODEOWNERS)

  This podcast tracks what shipped, what's being debated, and what's
  worth watching — for engineers building against UCP and for
  contributors deciding where to put effort.


# -----------------------------------------------------------------------------
# EP Graduation Criteria (from au.com.auspost.sustainability EP doc)
# -----------------------------------------------------------------------------
# Encoded so the digest can map each week's UCP/internal activity to a
# specific approval-path criterion. When a story moves us closer to (or
# further from) one of these, the digest should tag it explicitly.
ep_graduation_criteria:
  proposal_status: "Working Draft v0.4.2 (5 May 2026); target submission October 2026"

  working_draft_to_candidate:
    - id: "wdc.brands"
      criterion: "≥ 5 brands with infrastructure_attested"
    - id: "wdc.programme_types"
      criterion: "≥ 3 programme types with conformance profiles"
    - id: "wdc.agent_queries"
      criterion: "≥ 1,000 agent queries / month"
    - id: "wdc.registries"
      criterion: "All three registry layers (L1/L2/L3) live with certified_scope"
    - id: "wdc.schema_stability"
      criterion: "≥ 3 months of schema stability"
    - id: "wdc.multi_operator"
      criterion: "≥ 2 operators"
    - id: "wdc.scope_validation"
      criterion: "L1 scope-mismatch test cases passing"

  candidate_to_stable:
    - id: "cs.brands"
      criterion: "≥ 20 brands across ≥ 2 CAs"
    - id: "cs.ca_taxonomy"
      criterion: "≥ 2 certifier_type values in production"
    - id: "cs.agent_platforms"
      criterion: "≥ 2 agent platforms actively querying"
    - id: "cs.backward_compat"
      criterion: "≥ 6 months backward compatibility"
    - id: "cs.international"
      criterion: "≥ 1 non-Australian postal operator"
    - id: "cs.input_integrity"
      criterion: "input_integrity manifest independently verified by ≥ 1 third party"
    - id: "cs.ca_accreditation"
      criterion: "≥ 1 government-accredited CA active"
    - id: "cs.item_provenance"
      criterion: "get_item_provenance operational for ≥ 1 serialised product"

  approval_path_levers:
    # Specific UCP-side activity patterns that, when they appear, should
    # be treated as "tilts the EP toward approval" or "raises EP risk".
    - lever: "vendor_namespace_precedent"
      when: "Any UCP PR / governance decision codifying how vendor namespaces are registered, declared in /.well-known/ucp, or scoped to controlled domains."
      action: "Headline. Quote the precedent, note how it supports or threatens the EP architecture."
    - lever: "extension_companion_semantics"
      when: "Any change to how extensions or companion capabilities (allOf-style) work — schema rules, naming rules, version rules."
      action: "Headline. The EP companions (au.com.auspost.sustainability.checkout / .recovery) depend on this."
    - lever: "mcp_transport_decisions"
      when: "Any change to MCP transport conventions, capability discovery, or service endpoint semantics."
      action: "Headline. Our reference MCP server and AP-controlled endpoint design depend on these."
    - lever: "schema_stability_signals"
      when: "A v1.0 / RC release; a deprecation policy change; a published breaking-change window."
      action: "Map to wdc.schema_stability — schema stability is a Candidate criterion. Note implication for our submission timing."
    - lever: "conformance_governance"
      when: "Any change to how conformance profiles are defined, accepted, or evaluated."
      action: "Map to wdc.programme_types and wdc.scope_validation."
    - lever: "council_composition_or_review_process"
      when: "meeting-minutes shows changes to council membership, review SLA, EP review template, or extension acceptance criteria."
      action: "Map to overall approval path. Identify named reviewers whose stance matters."
    - lever: "competing_namespace"
      when: "Any other vendor namespace or extension proposal landing in the sustainability / EPR / circularity / DPP lane."
      action: "Top of show. Differentiate or align — don't ignore."


# -----------------------------------------------------------------------------
# Editorial Angle & Tone
# -----------------------------------------------------------------------------
editorial_angle: |
  This is an INTERNAL Circulr Tech weekly briefing on UCP activity.
  The frame is "what does this mean for us" — not a UCP-community
  newsletter. Frame every story through the lens of impact on
  Circulr Tech's roadmap, the Australia Post Enhancement Proposal,
  and the team's day-to-day work:

  - **EP-IMPACT FIRST.** For each story, ask: does this affect the
    `au.com.auspost.sustainability` proposal, the
    `dev.ucp.shopping.sustainability` capability, vendor-namespace
    rules, the extension/companion model, the MCP server contract,
    or any of the trust/manifest/computation primitives we depend on?
    If yes, lead with the impact. If no, just state the change.

  - **CIRCULR.AI ROADMAP IMPACT.** Schema changes that hit our data
    model, SDK API changes that affect customer integration time,
    conformance changes that block or unblock our reference MCP
    server — call these out specifically. Don't make PMs/architects
    work to translate.

  - **MERGED VS. DEBATED.** Distinguish between merged-and-shipped
    and open-and-contested. A contentious open PR on extension
    semantics is a strategic issue; a quiet doc merge is a footnote.

  - **RELEASES ARE HEADLINES.** Version bumps in `ucp-schema`,
    `python-sdk`, `js-sdk`, or `conformance` are episode openers.
    Surface version numbers and migration burden.

  - **GOVERNANCE SIGNALS.** When `meeting-minutes` lands, summarise
    the decision AND its second-order effect on our EP path —
    council composition, extension policy, namespace registration
    process, conformance criteria.

  - **OUTSIDE MOVES.** If another vendor namespace or extension
    proposal lands that overlaps the sustainability lane, that's
    a top-of-show item — competitive context the team needs.

  - **ENGAGEMENT OPPORTUNITIES.** For each week, identify 1-3 places
    where a Circulr Tech team member could productively engage:
    a comment on an open RFC, a review on a PR touching extension
    semantics, a benchmark contribution to conformance, an issue
    where adding our pilot data would be useful, a discussion where
    our reference MCP server is relevant prior art. Be specific —
    repo, PR/issue number, what to say. The point is to build EP
    capital BEFORE submission, not just react after.

  - **PRECEDENT SPOTTING.** When a UCP merge or governance decision
    sets a pattern that helps (or hurts) the EP architecture —
    vendor-namespace registration, capability-services declaration,
    independent-endpoint conventions, MCP transport conventions,
    extension/companion governance — call it out as a *precedent*,
    not just a code change. Quote the language we should reuse in
    the EP.

  - **GRADUATION-CRITERION MAPPING.** When activity affects any of
    the EP's Working Draft → Candidate or Candidate → Stable
    criteria (encoded under `ep_graduation_criteria` in this file),
    name the criterion ID explicitly (e.g. `wdc.schema_stability`).
    The team needs to track which criteria are moving.

  - **ACTIVE REVIEWERS.** The `contributors` block on each repo's
    activity payload lists who's reviewing and commenting this week.
    For `ucp`, `ucp-schema`, `meeting-minutes`, treat the top 3-5
    contributors as named stakeholders — call them out when their
    review, comment, or position matters for the EP path.

  - **QUIET WEEKS → PREPOSITION.** When UCP itself is quiet, that's
    the most valuable kind of week — call it out and prompt the team
    to *push EP-supporting work* this week: pilot-data updates, test
    cases, CA accreditation milestones, internal repo progress
    against graduation criteria. End the show with a concrete
    "EP work to push this week" list, not a generic sign-off.

  - **INTERNAL REPO SIGNALS.** The `Internal — AP Sustainability`
    group covers our own progress on the standard. Treat its activity
    as ground truth on graduation-criterion progress (e.g., schema
    stability, scope-validation tests, manifest implementation).
    Compare to the criteria block to flag what's still missing.

  - **SCOPE DISCIPLINE.** Don't speculate about Stripe / OpenAI /
    Anthropic agentic-commerce announcements unless a UCP repo
    directly references them. Stay close to what the commits show.

  Tone: two senior colleagues catching up on a Monday morning —
  informed, candid, willing to disagree on API design, and always
  asking "so what does this mean for us this week".


# -----------------------------------------------------------------------------
# Topics to Deprioritise
# -----------------------------------------------------------------------------
deprioritise:
  - "Dependabot bumps with no behavioural change"
  - "CI config tweaks that don't affect contributors"
  - "Pure typo / formatting PRs"
  - "Speculation about UCP's competitive position"
  - "Non-technical commentary on agentic-commerce hype"


# -----------------------------------------------------------------------------
# Recurring Segments
# -----------------------------------------------------------------------------
recurring_segments:
  - name: "EP Impact Watch"
    description: |
      The most important segment for an internal audience. Anything in
      the week's UCP activity that affects the
      `au.com.auspost.sustainability` Enhancement Proposal — vendor
      namespace rules, extension/companion semantics, capability
      registration process, governance steps, or schema primitives
      we depend on. Frame as risk-up / risk-down for the October
      submission target.

  - name: "Spec Watch"
    description: |
      Notable changes to the `ucp` spec or `ucp-schema` validator —
      new fields, deprecated fields, breaking changes, RFC-style
      proposals. Call out specifically what circulr.ai's data model
      or MCP server has to change in response.

  - name: "SDK Roundup"
    description: |
      Releases and notable PRs across `python-sdk` and `js-sdk`. Call
      out version bumps, new public APIs, and any SDK-divergence where
      one language ships before the other. Note: most of our customer
      integrations come through these SDKs, so version bumps have
      direct sales-cycle impact.

  - name: "Conformance Corner"
    description: |
      What's new in the `conformance` test suite and `samples` repos —
      new test cases, sample apps, and any conformance failures that
      our reference MCP server would now hit (or no longer hit).

  - name: "Governance Update"
    description: |
      Anything from `meeting-minutes` or `.github` worth flagging:
      council decisions, governance PRs, policy changes, new CODEOWNERS.
      Read between the lines — what does this mean for how our EP gets
      received in October?

  - name: "Outside Moves"
    description: |
      Other vendor namespaces, extension proposals, or competing
      capabilities that landed this week and overlap our sustainability
      lane. Strategic context the exec team needs.

  - name: "Engagement Opportunities"
    description: |
      Where to spend our community-engagement effort this week. For each
      item, name the repo, the PR/issue number, what to say, and which
      role (architect / engineer / Ian) is best placed to engage.
      Include only opportunities where a thoughtful comment or review
      builds EP capital — not generic drive-by participation.

  - name: "Precedent Watch"
    description: |
      Merges or governance decisions from this week that set a pattern
      we can reuse in the EP. For each: quote the language, name the
      criterion (`vendor_namespace`, `extension/companion`, `MCP`, etc),
      and note how to cite it in the EP submission.

  - name: "EP Criterion Tracker"
    description: |
      For each criterion that moved this week (forward or backward),
      name the criterion ID (e.g. `wdc.schema_stability`), state the
      change, and quantify progress where possible. Include criteria
      affected by the internal AP Sustainability Standard repo, not
      just UCP-side activity.

  - name: "Active Reviewers"
    description: |
      Brief stakeholder readout for `ucp`, `ucp-schema`, and
      `meeting-minutes`: who reviewed / commented most this week, and
      what their pattern suggests about how they'll receive an
      EP submission. Don't over-narrate — 30-second segment max.

  - name: "What to Watch"
    description: |
      Closing segment — open PRs, draft proposals, upcoming council
      meetings, and EP submission countdown. On quiet weeks, expand
      this segment into a concrete "EP work to push this week" list:
      what should the team ship internally to move graduation
      criteria forward.


