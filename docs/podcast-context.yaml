# -----------------------------------------------------------------------------
# Project Background
# -----------------------------------------------------------------------------
project_context: |
  The Universal Commerce Protocol (UCP) is an open standard for agentic
  commerce — letting AI agents, platforms, and merchants transact with
  each other without bespoke integrations. Think of it as a common
  language layer for autonomous commerce: a shared schema for offers,
  carts, payments, fulfilment, and provenance.

  UCP is governed as an open community (https://ucp.dev) with eight
  public GitHub repos under https://github.com/Universal-Commerce-Protocol:

  - **ucp** — the spec and authoritative documentation
  - **ucp-schema** — the Rust schema validator
  - **python-sdk** — the official Python SDK
  - **js-sdk** — the official JavaScript/TypeScript SDK
  - **conformance** — the conformance test suite
  - **samples** — reference implementations and example apps
  - **meeting-minutes** — governance council notes and decisions
  - **.github** — cross-repo configs (Code of Conduct, linters, CODEOWNERS)

  This podcast tracks what shipped, what's being debated, and what's
  worth watching — for engineers building against UCP and for
  contributors deciding where to put effort.


# -----------------------------------------------------------------------------
# Editorial Angle & Tone
# -----------------------------------------------------------------------------
editorial_angle: |
  This is a developer-facing weekly review, not a marketing channel. Frame
  stories through the lens of an engineer evaluating UCP for production
  use:

  - Lead with breaking changes, new endpoints, and schema additions —
    these are what implementers actually need to know.
  - Distinguish between merged-and-shipped vs. open-and-debated. A
    contentious open PR is a different story than a quiet merge.
  - Highlight cross-repo coupling: a schema change in `ucp-schema` that
    cascades to both SDKs is more interesting than three independent
    docs PRs.
  - Treat releases (tags, GitHub Releases) as headline events. Surface
    version numbers and link release notes when they exist.
  - When governance decisions land in `meeting-minutes`, summarise the
    outcome and the rationale, not just the meeting date.
  - Be honest about quiet weeks. If only docs typos and dependency bumps
    landed, say so — don't pad. Listeners notice manufactured drama.
  - Call out community contributions: first-time contributors, external
    PRs, and notable issue reporters deserve a mention.
  - Avoid speculation about non-UCP roadmaps (Stripe, OpenAI, Anthropic
    agentic-commerce announcements) unless a UCP repo directly references
    them. Stay close to what the commits show.
  - DISCLOSURE WHEN RELEVANT: Host A's company (Circulr Tech) is an
    active UCP implementer working on the `au.com.auspost.sustainability`
    vendor namespace with Australia Post. When an episode discusses
    vendor namespaces, the extension/companion model, sustainability,
    measurement-platform manifests, or similar topics where Host A has
    direct skin in the game, disclose the interest briefly and move on.
    Do NOT promote Circulr Tech or the proposal — the disclosure exists
    for listener trust, not airtime.

  The hosts should sound like two engineers reviewing the week's git log
  together — informed, occasionally opinionated about API design, and
  always grounded in what the code actually changed.


# -----------------------------------------------------------------------------
# Topics to Deprioritise
# -----------------------------------------------------------------------------
deprioritise:
  - "Dependabot bumps with no behavioural change"
  - "CI config tweaks that don't affect contributors"
  - "Pure typo / formatting PRs"
  - "Speculation about UCP's competitive position"
  - "Non-technical commentary on agentic-commerce hype"


# -----------------------------------------------------------------------------
# Recurring Segments
# -----------------------------------------------------------------------------
recurring_segments:
  - name: "Spec Watch"
    description: |
      The week's notable changes to the `ucp` spec or `ucp-schema`
      validator — new fields, deprecated fields, breaking changes,
      RFC-style proposals.

  - name: "SDK Roundup"
    description: |
      Releases and notable PRs across `python-sdk` and `js-sdk`. Call
      out version bumps, new public APIs, and any SDK-divergence where
      one language ships before the other.

  - name: "Conformance Corner"
    description: |
      What's new in the `conformance` test suite and `samples` repos —
      new test cases, sample apps, and any conformance failures that
      surfaced this week.

  - name: "Governance Update"
    description: |
      Anything from `meeting-minutes` or `.github` worth flagging:
      council decisions, governance PRs, policy changes, new CODEOWNERS.

  - name: "Issue Spotlight"
    description: |
      One open issue or discussion worth a closer look — usually a design
      debate, a tricky bug report, or a feature request that's gaining
      traction.

  - name: "First Contributors"
    description: |
      Welcome new external contributors who landed their first PR this
      week.


