delivery_instructions: >
  Two podcast hosts having a genuinely natural, unscripted-sounding
  conversation about a week of open-source protocol development. Include
  disfluencies and imperfections throughout — umms, ahhs, slight hesitations,
  laughs, and reactive interjections like 'oh nice', 'right', 'exactly',
  'that's interesting'. Pacing should feel organic and unhurried, like two
  engineers reviewing a week's commits over coffee. Australian-inflected
  English, informed-but-not-stuffy register.
