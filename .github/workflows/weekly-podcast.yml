name: Weekly Podcast Pipeline
on:
  schedule:
    - cron: '0 19 * * 3'  # Thursday 19:00 UTC = Friday 06:00 AEST
  workflow_dispatch:        # Manual trigger

jobs:
  generate-episode:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Connect to Tailnet
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WONDERCRAFT_API_KEY: ${{ secrets.WONDERCRAFT_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
          PIPELINE_ENVIRONMENT: production
          RUN_TRIGGER: github
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python pipeline/main.py
